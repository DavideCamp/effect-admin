# Postgres for the example app (and for @effect-admin/sql integration tests).
# No persistent volume ON PURPOSE: `docker compose down && up` gives a fresh,
# deterministic dataset (sql/ runs at first boot via initdb).
#
#   docker compose up -d
#   DATABASE_URL=postgres://admin:admin@localhost:5434/admin pnpm dev
services:
  db:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: admin
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d admin"]
      interval: 2s
      timeout: 2s
      retries: 15
